name: aggregate-on-completion

# Runs aggregator whenever any rank pushes new artifacts. The aggregator is
# CPU-only and lightweight (no model inference if --no_predict is given), so
# it fits comfortably on GitHub-hosted runners.
on:
  push:
    paths:
      - "results/rank_*/metrics/**"
      - "results/rank_*/plots/**"
      - "coordinator/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: |
          python -m pip install -U pip
          pip install pandas pyarrow numpy matplotlib scikit-learn PyYAML

      - name: Install FastUrduGuard (no torch)
        run: pip install -e . --no-deps

      - name: Detect rank readiness
        id: ranks
        run: |
          shopt -s nullglob
          ready=0
          for rd in results/rank_*; do
            if compgen -G "$rd/metrics/*.json" > /dev/null; then
              ready=$((ready + 1))
            fi
          done
          echo "ready=$ready" >> "$GITHUB_OUTPUT"
          echo "ranks_with_metrics=$ready"

      - name: Aggregate (no_predict on CI)
        if: steps.ranks.outputs.ready != '0'
        run: |
          python scripts/aggregate.py --no_predict || true

      - name: Commit and push aggregated outputs
        if: steps.ranks.outputs.ready != '0'
        run: |
          git config user.name  "fastur-bot"
          git config user.email "fastur-bot@users.noreply.github.com"
          git add results/leaderboard.* results/timing.* results/speedup.png \
                  results/ensemble_eval.csv results/ensemble_confusion.png \
                  results/ensemble_report.txt 2>/dev/null || true
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "ci: aggregator update [skip ci]"
          git push
